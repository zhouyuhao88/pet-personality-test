body::before{
content:"";

content:"";

const box = document.getElementById('questions');
const progressBar = document.getElementById('progressBar');

questions.forEach((item,index)=>{
const div=document.createElement('div');
div.className='question-card';

let html=`<div class="question-title">${item.q}</div><div class="options">`;

item.options.forEach((op,i)=>{
html += `
<label class="option">
<input type="radio" name="q${index}" value="${String.fromCharCode(65+i)}">
<span>${op}</span>
</label>`;
});

html += '</div>';
div.innerHTML=html;
box.appendChild(div);

const radios = div.querySelectorAll('input');
radios.forEach(r=>{
r.addEventListener('change', updateProgress);
});
});

function updateProgress(){
const total = questions.length;
const checked = document.querySelectorAll('input[type="radio"]:checked').length;
const percent = (checked / total) * 100;
progressBar.style.width = percent + '%';
}

function initParticles(){
const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

const particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,0.25)';
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
}

initParticles();

function analyzeResult(){
const answers=[];
for(let i=0;i<questions.length;i++){
const checked=document.querySelector(`input[name=q${i}]:checked`);
if(!checked){
alert('请完成所有问题后再查看结果');
return;
}
answers.push(checked.value);
}

cat:0,
dog:0,
reptile:0,
rodent:0,
aquarium:0,

insect:0,

};

answers.forEach(a=>{
if(a==='A'){
score.cat+=3;
score.dog+=3;
score.bird+=1;
}
if(a==='B'){
score.rodent+=3;
score.turtle+=2;
score.cat+=1;
}
if(a==='C'){
score.reptile+=3;
score.aquarium+=3;
score.frog+=2;
score.insect+=2;
}
if(a==='D'){
score.reptile+=4;
score.insect+=4;
score.frog+=3;
score.turtle+=2;
score.aquarium+=1;
}
});
